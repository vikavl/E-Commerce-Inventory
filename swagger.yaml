openapi: 3.0.3
info:
  title: Inventory & Order API
  version: 1.0.0

paths:
  /api/v1/inventory/changes:
    get:
      summary: GET api/v1/inventory/changes
      operationId: getLastStockChanges
      parameters:
        - name: hours
          in: query
          required: true
          schema:
            type: integer
            format: int32
        - name: minutes
          in: query
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryChangeDto"

  /api/v1/products:
    get:
      summary: GET api/v1/products
      operationId: getProducts
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            format: int32
        - name: size
          in: query
          required: true
          schema:
            type: integer
            format: int32
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: id
        - name: ascending
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductDto"

  /api/v1/products/{id}:
    get:
      summary: GET api/v1/products/{id}
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ProductDto"

    put:
      summary: PUT api/v1/products/{id}
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductDto"
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object

  /api/v1/orders:
    post:
      summary: POST api/v1/orders
      operationId: placeOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object

  /api/v1/orders/{id}:
    get:
      summary: GET api/v1/orders/{id}
      operationId: getOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/OrderDto"

components:
  schemas:
    InventoryChangeDto:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        quantityChange:
          type: integer
        timestamp:
          type: string
          format: date-time

    ProductDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
          format: double
        stock:
          type: integer

    CreateOrderRequest:
      type: object
      properties:
        productId:
          type: string
        quantity:
          type: integer

    OrderDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        productId:
          type: string
        quantity:
          type: integer
        status:
          type: string